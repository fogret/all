name: 同步远程IP仓库全部文件
#on:
  schedule:
    - cron: '0 10 * * *'  # 北京时间每日18点自动同步
  workflow_dispatch:      # 支持仓库页面手动一键触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取当前本地仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取目标仓库 ip 目录全部文件
        uses: actions/checkout@v4
        with:
          repository: q1017673817/iptvz
          ref: main
          path: temp_ip_source

      - name: 覆盖同步ip目录文件
        run: |
          # 清空本地旧ip目录
          rm -rf ./ip
          # 同步远程完整ip目录到本地
          cp -r ./temp_ip_source/ip ./
          # 删除临时缓存文件夹
          rm -rf ./temp_ip_source

      - name: 提交+推送同步文件
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add ip/
          # 无文件变更直接跳过提交，不报错
          if git diff --cached --quiet; then
            echo "✅ 文件无更新，无需同步提交"
          else
            git commit -m "🔄 自动同步远程iptvz仓库ip目录全部配置文件"
            git push
          fi
