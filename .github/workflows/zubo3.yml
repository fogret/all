name: zubo3
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests aiohttp

      # 第一步先同步远程，避免覆盖本地新文件
      - name: 同步远程最新代码
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git pull origin main --rebase

      # 第二步生成缺失名单
      - name: 扫描统计缺失模板并生成名单
        run: |
          python - << EOF
          # -*- coding: utf-8 -*-
          import os

          TEMPLATE_DIR = "./template"
          os.makedirs(TEMPLATE_DIR, exist_ok=True)

          provinces = [
              "北京","天津","河北","山西","内蒙古","辽宁","吉林","黑龙江",
              "上海","江苏","浙江","安徽","福建","江西","山东","河南",
              "湖北","湖南","广东","广西","海南","重庆","四川","贵州",
              "云南","西藏","陕西","甘肃","青海","宁夏","新疆"
          ]
          isps = ["电信","联通","移动"]

          exist_files = set(os.listdir(TEMPLATE_DIR))
          missing_list = []

          for p in provinces:
              for isp in isps:
                  target_name = f"template_{p}{isp}.txt"
                  if target_name not in exist_files:
                      missing_list.append(f"{p} {isp} | {target_name}")

          # 根目录生成文件
          with open("./缺失省份名单.txt", "w", encoding="utf-8") as f:
              f.write("=== Template缺失模板文件清单 ===\n")
              f.write(f"总计缺失：{len(missing_list)} 个\n\n")
              for item in missing_list:
                  f.write(item + "\n")

          print("✅ 扫描完成")
          print(f"📄 总计缺失模板：{len(missing_list)} 个")
          print("📃 名单已保存至根目录：缺失省份名单.txt")
          EOF

      # 第三步运行扫描脚本
      - name: 运行扫描主脚本
        run: |
          cd $GITHUB_WORKSPACE
          python ./zubo.py

      # 第四步强制提交+推送所有改动，包含名单文件
      - name: 提交并推送所有文件
        run: |
          git add .
          git commit -m "自动生成缺失省份名单 + 扫描更新"
          git push origin main
