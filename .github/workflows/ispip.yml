name: 全国运营商IP网段采集
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库文件
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行网段采集
        run: python ispip.py

      - name: 提交保存网段文件
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add ispip/
          git commit -m "自动更新全国电信/联通/移动IP网段"
          git push
