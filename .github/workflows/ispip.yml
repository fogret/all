name: 全国运营商IP网段采集
#on:
  schedule:
    # 北京时间 每日18:00 自动执行
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库文件
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行网段采集生成配置
        run: python ispip.py

      - name: 提交推送文件
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add ispip/ ip/
          # 无文件改动直接退出，不报错
          if git diff --cached --quiet; then
            echo "无新增网段，无需提交"
          else
            git commit -m "自动生成各省运营商扫描配置"
            git push
          fi
