name: 全国运营商IP网段采集
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库文件
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行网段采集生成配置
        run: python ispip.py

      - name: 提交所有生成文件
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com@example.com"
          git add ispip/ ip/
          git diff --quiet && git diff --staged --quiet || git commit -m "自动生成各省运营商扫描配置"
          git push
