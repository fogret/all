name:下载全部频道图标
on: workflow_dispatch
jobs:
  dl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install requests pypinyin
      - run: |
          python3
          import os,requests
          from pypinyin import lazy_pinyin
          os.makedirs("tvlogo",exist_ok=1)
          u="https://www.xn--rgv465a.top/tvlogo/"
          h={"User-Agent":"Mozilla/5.0"}
          def py(x):return ''.join(lazy_pinyin(x)).lower()+".png"
          def d(n):
              f=py(n)
              if os.path.exists("tvlogo/"+f):return
              r=requests.get(u+f,headers=h,timeout=6)
              if r.status_code==200:open("tvlogo/"+f,"wb").write(r.content)
          ls=open("channels.txt","r",encoding="utf-8").read().splitlines()
          for i in ls:d(i)
      - run: |
          git config --global user.name a
          git config --global user.email a@a.com
          git add tvlogo/
          git commit -m "更新图标"||true
          git push
