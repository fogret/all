name: zubo

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:
  push:
    branches:
      - main   # 保证仓库活跃，避免 GitHub 自动暂停 schedule

permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests aiohttp

      - name: Run IPTV scan script
        run: |
          python ./zubo.py

      - name: 完成
        run: echo "任务已执行（无文件更新）"
