name: zubo

on:
  schedule:
    - cron: "0 2 * * *"   # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests aiohttp

      # ★★★ 必须加入：修复 Author identity unknown
      - name: Set Git identity
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Run script
        run: python zubo.py

      - name: Commit and push (github-actions[bot])
        run: |
          git add .
          git commit -m "自动更新（github-actions[bot] 提交）" || echo "No changes to commit"
          git push
