name: zubo

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests aiohttp

      - name: Configure Git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"

      # 避免 rebase 冲突
      - name: Pull latest changes (safe merge)
        run: |
          git pull origin main --no-rebase || true

      - name: Run IPTV scan script
        run: |
          python ./zubo.py

      # 强制提交（无论是否有变化）
      - name: Force commit and push
        run: |
          git add .
          git commit -m "自动更新IPTV源文件（强制提交）" --allow-empty
          git push origin main
