name: zubo

on:
  schedule:
    - cron: '0 11 */3 * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - name: 安装Python依赖
        run: |
          pip install requests aiohttp

      - name: 运行扫描代码
        run: python zubo.py

      - name: 提交更新文件
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "自动更新IP + 测速排序"
          git push
