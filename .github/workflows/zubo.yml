name: zubo

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:
  push:
    branches:
      - main   # 保证仓库永远保持活跃，避免 GitHub 自动休眠

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests aiohttp

      - name: Configure Git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"

      # 关键：避免 rebase 冲突导致 workflow 失败
      - name: Pull latest changes (safe merge)
        run: |
          git pull origin main --no-rebase || true

      - name: Run IPTV scan script
        run: |
          python ./zubo.py

      # 关键：避免空提交导致失败
      - name: Commit and push changes
        run: |
          git add .
          git diff --cached --quiet || git commit -m "自动更新IPTV源文件"
          git push origin main
