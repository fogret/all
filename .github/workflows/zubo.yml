name: zubo

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests aiohttp

      - name: 配置Git提交信息
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"

      # 先同步远程，避免推送冲突
      - name: 同步远程最新代码
        run: |
          git pull origin main --rebase

      # 再运行脚本生成新IP文件
      - name: 运行扫描测速脚本
        run: |
          cd $GITHUB_WORKSPACE
          python ./zubo.py

      # 最后提交推送
      - name: 提交并推送文件到仓库
        run: |
          git add .
          git commit -m "自动更新IPTV源文件"
          git push origin main
